; Controle temperatura ESP32 — build/upload/monitor via PlatformIO (Cursor)
; Placa: ESP32 DevKit 38 pinos

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; PlatformIO usa marcoschwartz (LCD_USA_NEW_LIQUIDCRYSTAL=0)
build_flags = -D LCD_USA_NEW_LIQUIDCRYSTAL=0
; Evita compilar testes_hardware/ e libraries/ locais (lib_deps ja fornece OneWire etc.)
build_src_filter = +<*> -<testes_hardware/> -<libraries/>

lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

; Teste TPL0501: use o mini-projeto em testes_hardware/teste_tpl0501/
;   cd testes_hardware/teste_tpl0501 && pio run -t uploadnOVO 