; Controle temperatura ESP32 — build/upload/monitor via PlatformIO (Cursor)
; Placa: ESP32 DevKit 38 pinos
; Core Arduino-ESP32 3.x via pioarduino (necessário para rbdimmerESP32)
;
; Se pioarduino/stable falhar (Python/uv), use a linha comentada abaixo:
; platform = espressif32 @ 6.12.0 + platform_packages (Arduino 3.0.7) — ver README

[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -D LCD_USA_NEW_LIQUIDCRYSTAL=0
build_src_filter = +<*> -<testes_hardware/> -<libraries/>

lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    https://github.com/robotdyn-dimmer/rbdimmerESP32.git

; Curvas do dimmer — teste na bancada (sobrescreve DIMMER_CURVA_TIPO de config.h)
[env:esp32dev_curva_linear]
extends = env:esp32dev
build_flags = ${env:esp32dev.build_flags} -D DIMMER_CURVA_TIPO=0

[env:esp32dev_curva_rms]
extends = env:esp32dev
build_flags = ${env:esp32dev.build_flags} -D DIMMER_CURVA_TIPO=1

[env:esp32dev_curva_log]
extends = env:esp32dev
build_flags = ${env:esp32dev.build_flags} -D DIMMER_CURVA_TIPO=2
