; Mini-projeto PlatformIO — teste TPL0501
;
; SEU CASO (2 chips + resistor em paralelo):
;   cd testes_hardware/teste_tpl0501
;   pio run -t upload
;   pio device monitor -b 115200
;
; Outros modos: -e esp32dev (1 chip) | -e esp32dev_duplo (2 serie sem paralelo)

[platformio]
src_dir = .
default_envs = esp32dev_paralelo

; 2× série + resistor em paralelo — PADRÃO (igual à malha principal)
[env:esp32dev_paralelo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -D MODO_POT_REDE_SOBRESCREVER=3
build_src_filter = +<*>

; 1× TPL0501
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -D MODO_POT_REDE_SOBRESCREVER=0
build_src_filter = +<*>

; 2× TPL0501 em série (sem paralelo)
[env:esp32dev_duplo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -D MODO_POT_REDE_SOBRESCREVER=2
build_src_filter = +<*>
